<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ask Talha (AI), Talha's AI Guide</title>
<link rel="stylesheet" href="../../assets/styles.css" />
<style>
  /* Full-screen chat experience */
  body {
    margin: 0;
    overflow: hidden;
    height: 100vh;
    height: 100dvh;
  }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: 100vh;
    height: 100dvh;
  }

  .sidebar {
    height: 100vh;
    height: 100dvh;
  }

  .main {
    padding: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  .chat-page-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--line);
    background: white;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .chat-avatar {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 18px;
    flex-shrink: 0;
  }
  .chat-avatar-info { flex: 1; min-width: 0; }
  .chat-avatar-info .name {
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }
  .chat-avatar-info .status {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    box-shadow: 0 0 6px #4ade80;
  }
  .chat-clear-btn {
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--muted);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
  }
  .chat-clear-btn:hover { color: var(--orange); }

  .chat-suggestions-bar {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .chat-suggestions-bar::-webkit-scrollbar { display: none; }

  .suggestion-chip {
    padding: 8px 14px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 100px;
    font-family: inherit;
    font-size: 13px;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
    font-weight: 500;
  }
  .suggestion-chip:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-light);
  }

  .chat-messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #fafafa;
    -webkit-overflow-scrolling: touch;
  }

  .chat-msg {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .chat-msg p { margin: 0 0 6px; }
  .chat-msg p:last-child { margin-bottom: 0; }
  .chat-msg.user {
    align-self: flex-end;
    background: var(--green);
    color: white;
    border-bottom-right-radius: 6px;
  }
  .chat-msg.bot {
    align-self: flex-start;
    background: white;
    border: 1px solid var(--line);
    color: var(--text);
    border-bottom-left-radius: 6px;
  }
  .chat-msg.bot strong { color: var(--green-dark); }
  .chat-msg.bot ul, .chat-msg.bot ol { padding-left: 22px; margin: 6px 0; }
  .chat-msg.bot li { font-size: 14px; margin-bottom: 4px; }
  .chat-msg.bot a { color: var(--green); font-weight: 600; }

  .chat-msg.bot.typing {
    padding: 14px 18px;
    display: flex;
    gap: 5px;
  }
  .chat-msg.bot.typing span {
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: typing-bounce 1.2s infinite;
  }
  .chat-msg.bot.typing span:nth-child(2) { animation-delay: 0.2s; }
  .chat-msg.bot.typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing-bounce {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
  }

  .chat-input-bar {
    padding: 12px 16px;
    background: white;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }
  .chat-input-field {
    flex: 1;
    padding: 12px 18px;
    border: 1px solid var(--line);
    border-radius: 100px;
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    background: var(--surface);
  }
  .chat-input-field:focus {
    border-color: var(--green);
    background: white;
  }
  .chat-send-btn {
    width: 46px;
    height: 46px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .chat-send-btn:hover { background: var(--green-dark); }
  .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* MOBILE - full screen, no sidebar */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { height: 100vh; height: 100dvh; }
    .chat-page-header { padding: 12px 16px; }
    .chat-msg { max-width: 88%; font-size: 14px; }
    .suggestion-chip { font-size: 12px; padding: 7px 12px; }
  }

  /* API Key Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal {
    background: white;
    padding: 28px;
    border-radius: 16px;
    max-width: 420px;
    width: 100%;
  }
  .modal h3 { margin: 0 0 8px; }
  .modal-input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    margin: 12px 0;
    outline: none;
    box-sizing: border-box;
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main">

    <!-- HEADER -->
    <div class="chat-page-header">
      <div class="chat-avatar">T</div>
      <div class="chat-avatar-info">
        <div class="name">AI Talha</div>
        <div class="status"><span class="status-dot"></span>Online · 24/7</div>
      </div>
      <button class="chat-clear-btn" id="chatClear" title="Clear chat">⟲</button>
    </div>

    <!-- SUGGESTIONS BAR (horizontal scroll) -->
    <div class="chat-suggestions-bar" id="chatSuggestions"></div>

    <!-- MESSAGES -->
    <div class="chat-messages-area" id="chatMessages"></div>

    <!-- INPUT -->
    <div class="chat-input-bar">
      <input type="text" id="chatInput" class="chat-input-field" placeholder="Apna sawaal yahan likho..." autocomplete="off" />
      <button id="chatSend" class="chat-send-btn" aria-label="Send">↑</button>
    </div>

    <!-- API KEY MODAL -->
    <div class="modal-overlay" id="apiKeyModal">
      <div class="modal">
        <h3>API Key Chahiye</h3>
        <p style="font-size: 13px; color: var(--muted); margin: 0 0 12px;">
          OpenRouter free key le lo:
        </p>
        <ol style="padding-left: 18px; font-size: 13px; margin: 0 0 8px;">
          <li><a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a></li>
          <li>"Create Key", paste below</li>
        </ol>
        <input type="password" id="apiKeyInput" class="modal-input" placeholder="sk-or-v1-..." />
        <button class="btn" onclick="saveApiKeyFromModal()" style="width:100%;">Save</button>
      </div>
    </div>

  </main>
</div>

<script src="../../assets/components.js"></script>
<script src="../../assets/chat.js"></script>
</body>
</html>
